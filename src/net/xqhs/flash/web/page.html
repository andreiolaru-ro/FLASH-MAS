<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Flash-MAS</title>
    <script src="js/lib/jquery-3.7.1.min.js"></script>
    <script src="js/lib/sockjs.js"></script>
    <script src="js/lib/vertx-eventbus.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://unpkg.com/@material/web@latest/material-components-web.min.css">
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
<div id="root">
    <button id="sidepanel-btn">
        <span class="material-icons">menu</span>
    </button>

    <aside class="sidepanel open" id="sidepanel">
        <div id="sidepanel-header">
            <span>Global</span>
            <button class="material-icons" id="sidepanel-close-btn">close</button>
        </div>
        <div id="sidepanel-content">
            <div class="side-section">
                <div class="side-drawer">
                    <button id="global-start-btn">Start</button>
                </div>
                <div class="side-drawer">
                    <button id="global-stop-btn">Stop</button>
                </div>
                <div class="side-drawer">
                    <button id="global-pause-application-btn">Pause application</button>
                </div>
                <div class="side-drawer">
                    <button id="global-start-application-btn">Start application</button>
                </div>
                <div class="side-drawer">
                    <button id="global-stop-application-btn">Stop application</button>
                </div>
            </div>
            <div class="side-section" id="entities-list"></div>
            <div id="inactive-entities-section">
                <h3>Inactive Agents</h3>
                <div id="inactive-entities-list"></div>
            </div>
        </div>
    </aside>

    <main class="collapsed" id="main-content">

        <details class="deploy-section" open>
            <summary>
                <span class="material-icons">dns</span>
                <span>Deploy Nodes (Daemon Manager)</span>
            </summary>

            <div id="daemon-section" style="margin-top:20px; padding:15px; background:#fff; border:1px solid #ddd;">

                <div class="daemon-controls" style="margin-bottom:15px; background:#f9f9f9; padding:10px;">
                    <label>Add Daemon:</label>
                    <input type="text" id="new-daemon-ip" placeholder="IP Address (e.g., 127.0.0.1)" />
                    <input type="number" id="new-daemon-port" placeholder="Port" value="35274" style="width: 80px;" />
                    <button onclick="ui.connectDaemon()">+ Connect</button>

                    <span style="margin-left:20px; border-left:1px solid #ccc; padding-left:20px;">
                    <button id="deploy-all-btn" onclick="ui.deployAll()" style="background-color: #28a745; color: white;">🚀 Deploy 0 configurations</button>
                    <button onclick="ui.refreshDaemons()" style="background-color: #6c757d; color:white;">↻ Refresh</button>
                </span>

                    <span style="float:right;">
                    <button onclick="ui.killAllJVMs()" style="background-color: #ff9800; color: white; margin-right:5px;">☠ Kill All JVMs</button>
                    <button onclick="ui.killAllDaemons()" style="background-color: #d32f2f; color: white;">☠ Kill All Daemons</button>
                </span>
                </div>

                <table class="daemon-table" style="width:100%; border-collapse:collapse;">
                    <thead>
                    <tr style="background:#eee; text-align:left;">
                        <th style="padding:10px; width:100px;">Status</th>
                        <th style="padding:10px; width:150px;">Address</th>
                        <th style="padding:10px;">Configuration (Startup Arguments)</th>
                        <th style="padding:10px; width:180px;">Actions</th>
                    </tr>
                    </thead>
                    <tbody id="daemon-list-body">
                    <tr><td colspan="4" style="text-align:center; padding:20px; color:#999;">Waiting for data...</td></tr>
                    </tbody>
                </table>
            </div>
        </details>

        <details class="viz-section" open>
            <summary style="display:flex; justify-content:space-between; align-items:center; width:100%;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <span class="material-icons">bar_chart</span>
                    <span>Visualizations Dashboard</span>
                </div>
                <div id="viz-header-controls" style="display:flex; align-items:center;">
                    <button id="btn-open-viz-modal" style="background:#6200ea; color:white; border:none; padding:5px 15px; border-radius:4px; cursor:pointer; font-weight:bold; font-size:0.9rem;">+ Add Plot</button>
                </div>
            </summary>
            <div id="viz-dashboard"></div>
        </details>

        <div id="main-header">
            <h1>No selected entities</h1>
        </div>
        <div id="selected-entities-list"></div>

        <!-- Add Visualization Modal -->
        <div id="viz-modal" class="viz-modal">
            <div class="viz-modal-content">
                <div class="viz-modal-header">
                    <h2>Add New Visualization</h2>
                    <span class="viz-modal-close material-icons">close</span>
                </div>
                <div class="viz-modal-body">
                    <div class="viz-form-group">
                        <label>Title:</label>
                        <input type="text" id="viz-title" placeholder="e.g., Agent Positions">
                    </div>
                    <div class="viz-form-group">
                        <label>Chart Type:</label>
                        <select id="viz-type">
                            <option value="scatter">2D Scatter Plot</option>
                            <option value="heatmap">2D Grid (Heatmap)</option>
                            <option value="line">Line Chart (Time Series)</option>
                            <option value="bar">Bar Chart (Histogram)</option>
                            <option value="graph">Network Graph</option>
                        </select>
                    </div>
                    <div class="viz-form-group">
                        <label>Agent Filter (Regex/Name):</label>
                        <input type="text" id="viz-category" placeholder="e.g., human, car, composite">
                    </div>
                    <div class="viz-form-group">
                        <label>X-Axis Property (Optional):</label>
                        <input type="text" id="viz-xaxis" placeholder="e.g., x">
                    </div>
                    <div class="viz-form-group">
                        <label>Y-Axis Property (Optional):</label>
                        <input type="text" id="viz-yaxis" placeholder="e.g., y">
                    </div>
                    <div class="viz-form-group">
                        <label>Value Property (Z-Axis / Heatmap):</label>
                        <input type="text" id="viz-zaxis" placeholder="e.g., energy, pheromone">
                    </div>
                    <div class="viz-form-group">
                        <label>Width:</label>
                        <select id="viz-width">
                            <option value="w-100">100%</option>
                            <option value="w-75">75%</option>
                            <option value="w-66">66%</option>
                            <option value="w-50">50%</option>
                            <option value="w-33">33%</option>
                            <option value="w-25">25%</option>
                        </select>
                    </div>
                    <div class="viz-form-group">
                        <label>Height:</label>
                        <select id="viz-height">
                            <option value="h-1">1 Unit (350px)</option>
                            <option value="h-2">2 Units (720px)</option>
                            <option value="h-3">3 Units (1090px)</option>
                        </select>
                    </div>
                    <div class="viz-form-group">
                        <label>Color Rule (JSON) (Optional):</label>
                        <input type="text" id="viz-color-rule" placeholder='{"property":"state", "map":{"infected":"red","healthy":"green"}}'>
                    </div>
                    <div class="viz-form-group">
                        <button id="btn-save-viz" style="background:#4CAF50; color:white; border:none; padding:10px; width:100%; border-radius:4px; cursor:pointer; margin-top:10px; font-weight:bold;">Create Widget</button>
                    </div>
                </div>
            </div>
        </div>

        <input type="file" id="import-yaml-file" style="display: none;" accept=".yaml,.yml">

    </main>
</div>

<script src="https://unpkg.com/@material/web@latest/material-components-web.min.js"></script>
<script type="module" src="js/main.js"></script>
<script type="module" src="js/events.js"></script>
<script type="module" src="js/ui.js"></script>
</body>
</html>
